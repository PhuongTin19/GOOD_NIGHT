<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 Chúc Ngủ Ngon - Như Thương 💖</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
</head>
<body>

<!-- ================= Background ================= -->

<div id="stars"></div>

<div id="shooting-stars"></div>

<div id="hearts"></div>

<div class="moon"></div>

<div class="moon-glow"></div>

<!-- ================= Music ================= -->

<button id="musicBtn" class="music-btn">
    🎵
</button>

<audio id="bgMusic" loop>
    <!-- Thay link này bằng file mp3 của bạn -->
    <source src="/music/piano.mp3" type="audio/mpeg">
</audio>

<!-- ================= Main Card ================= -->

<div class="card">

    <h1>
        🌙 Chúc Ngủ Ngon
    </h1>

    <h2 class="name">
        💖 Như Thương 💖
    </h2>

    <div class="divider"></div>

    <p class="intro">

        Một ngày dài đã kết thúc...

        <br><br>

        Hy vọng Hân sẽ có một đêm thật bình yên,
        thật nhiều giấc mơ đẹp
        và thức dậy với thật nhiều năng lượng.

    </p>

    <button
        id="openLetter"
        class="main-btn">

        💌 Nhận lời chúc

    </button>

</div>

<!-- ================= Popup ================= -->

<div
    id="popup"
    class="popup">

    <div class="letter">

        <span class="close">

            ✖

        </span>

        <div class="letter-top">

            🌙

        </div>

        <h2>

            Gửi đến

            <br>

            <span>

                Như Thương 💖

            </span>

        </h2>

        <div
            id="typing"
            class="typing">

        </div>

        <button
            id="closeBtn"
            class="close-btn">

            🥰 Cảm ơn

        </button>

    </div>

</div>

<!-- ================= Footer ================= -->

<div class="footer">

    Made with ❤️

</div>

<!-- ================= JS ================= -->

<script src="script.js"></script>

</body>
</html>
